name: Собрать APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Собрать Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установить pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Установить зависимости (root workspace)
        run: pnpm install

      - name: Установить EAS CLI
        run: npm install -g eas-cli

      - name: Проверить Expo аккаунт
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: artifacts/mobile

      - name: Собрать APK в облаке Expo
        id: build
        run: |
          BUILD_URL=$(eas build -p android --profile preview --non-interactive --json 2>/dev/null | tail -1 | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j[0]?.buildDetailsPageUrl||'')}catch(e){console.log('')}})")
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
          eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: artifacts/mobile

      - name: Скачать готовый APK
        run: |
          mkdir -p /tmp/apk
          eas build:download --platform android --output /tmp/apk/warm-call.apk --non-interactive --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: artifacts/mobile

      - name: 📦 Сохранить APK для скачивания
        uses: actions/upload-artifact@v4
        with:
          name: warm-call-android
          path: /tmp/apk/warm-call.apk
          retention-days: 30
